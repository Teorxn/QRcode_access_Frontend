services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: QrCodeAccessDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../QRcode_access_Backend
      dockerfile: Dockerfile
    ports:
      - "5057:5057"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=QrCodeAccessDb;Username=postgres;Password=123"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5057"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
